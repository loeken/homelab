apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: jackett
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    chart: jackett
    repoURL: https://k8s-at-home.com/charts/
    targetRevision: "11.3.0"
    helm:
      values: |
        persistence:
          config:
            enabled: true
            accessMode: "ReadWriteOnce"
            storageClass: "{{ .Values.storageClass }}"
            size: "1Gi"
            readOnly: false
          torrentblackhole:
            enabled: true
            accessMode: "ReadWriteMany"
            size: "{{ .Values.sharedmedia.size }}"
            storageClass: "{{ .Values.sharedmedia.storageClass }}"
            existingClaim: "shared-media"
            mountPath: "/downloads"
        ingress:
          main:
            annotations:
              kubernetes.io/ingress.class: "nginx"
              cert-manager.io/cluster-issuer: "{{ .Values.clusterIssuer }}"
              external-dns.alpha.kubernetes.io/hostname: "jackett.{{ .Values.domain }}."
              external-dns.alpha.kubernetes.io/cloudflare-proxied: "false"
              external-dns.alpha.kubernetes.io/ttl: "120"
              nginx.ingress.kubernetes.io/auth-url: http://authelia.authelia.svc.cluster.local/api/verify
              nginx.ingress.kubernetes.io/auth-signin: https://auth.{{ .Values.domain }}
            enabled: true
            hosts:
              - host: jackett.{{ .Values.domain }}
                paths:
                  - path: /
                    pathType: Prefix
                    service:
                      port: 9117
            tls:
            - secretName: jackett-tls
              hosts:
              - jackett.{{ .Values.domain }}
        podSecurityContext:
          runAsUser: 568
          runAsGroup: 568
          fsGroup: 568  
  destination:
    namespace: media
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
